# render.yaml — Render.com backend deployment only
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: filter-analyzer-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FRONTEND_ORIGIN
        value: https://filter-analyzer.vercel.app # update after Vercel deploy
