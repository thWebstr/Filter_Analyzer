# render.yaml — Render.com multi-service deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────
  - type: web
    name: filter-analyzer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # upgrade to starter for always-on
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://filter-analyzer.onrender.com   # update to your frontend URL after first deploy

  # ── Frontend (Static) ─────────────────────────────────────────
  - type: web
    name: filter-analyzer
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://filter-analyzer-api.onrender.com   # update to your backend URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback for React Router
